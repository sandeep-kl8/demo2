name: Hello World Structured Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:

  # -------------------------------
  # Parallel RU Builds
  # -------------------------------

  build_ru_1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build RU 1
        run: |
          echo "Building RU 1..."
          echo "RU1 artifact" > ru1.txt

      - name: Upload RU1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ru1
          path: ru1.txt

  build_ru_2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build RU 2
        run: |
          echo "Building RU 2..."
          echo "RU2 artifact" > ru2.txt

      - name: Upload RU2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ru2
          path: ru2.txt

  # -------------------------------
  # Assembly Job (Runs After RUs)
  # -------------------------------

  assemble:
    runs-on: ubuntu-latest
    needs: [build_ru_1, build_ru_2]

    steps:
      - name: Download RU1
        uses: actions/download-artifact@v4
        with:
          name: ru1

      - name: Download RU2
        uses: actions/download-artifact@v4
        with:
          name: ru2

      - name: Assemble
        run: |
          echo "Assembling..."
          cat ru1.txt ru2.txt > assembly.txt

      - name: Upload Assembly
        uses: actions/upload-artifact@v4
        with:
          name: assembly
          path: assembly.txt

  # -------------------------------
  # Installer Job (Final Step)
  # -------------------------------

  installer:
    runs-on: ubuntu-latest
    needs: assemble

    steps:
      - name: Download Assembly
        uses: actions/download-artifact@v4
        with:
          name: assembly

      - name: Install
        run: |
          echo "Installing..."
          cat assembly.txt
          echo "Hello World Pipeline Completed!"
